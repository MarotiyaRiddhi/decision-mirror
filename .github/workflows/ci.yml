name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  verify:
    name: verify (node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Create stub .env.local for doctor
        run: |
          printf 'NEXT_PUBLIC_AGORA_APP_ID=0123456789abcdef0123456789abcdef\nNEXT_AGORA_APP_CERTIFICATE=fedcba9876543210fedcba9876543210\n' > .env.local

      - name: Verify (lint + typecheck + api-contracts + build)
        run: pnpm run verify
